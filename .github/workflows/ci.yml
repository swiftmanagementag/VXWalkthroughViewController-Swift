name: CI

on:
  push:
    branches: [master, ios26_refactor, "feature/**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spm:
    name: SwiftPM build & test (macOS host)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build (default — traits off)
        run: swift build -v
      - name: Test (default — traits off)
        run: swift test -v
      - name: Test (all traits on)
        run: swift test -v --enable-all-traits
      - name: Acceptance — core & scanner reference no opt-in privacy frameworks
        run: |
          set -euo pipefail
          dirty=0
          echo "Checking core (VXWalkthrough) for privacy-sensitive APIs…"
          if grep -REn "import (UserNotifications|AVFoundation|Photos|Contacts|CoreLocation|AppTrackingTransparency)|CNContactStore|PHPhotoLibrary|CLLocationManager|ATTrackingManager|AVCaptureDevice|UNUserNotificationCenter" Sources/VXWalkthrough; then
            echo "::error::Core product references a privacy-sensitive framework; these must live in VXWalkthroughPermissions."
            dirty=1
          fi
          echo "Checking scanner (VXWalkthroughScanner) for Contacts/Photos/Location/Tracking…"
          if grep -REn "import (Photos|Contacts|CoreLocation|AppTrackingTransparency)|CNContactStore|PHPhotoLibrary|CLLocationManager|ATTrackingManager" Sources/VXWalkthroughScanner; then
            echo "::error::Scanner product references a forbidden privacy framework (camera/AVFoundation is allowed)."
            dirty=1
          fi
          if [ "$dirty" -eq 0 ]; then echo "OK: core and scanner link no opt-in privacy frameworks."; fi
          exit $dirty

  ios-build:
    name: iOS build (all products + demo)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      # The SwiftUI layer uses iOS 26 SDK symbols (Liquid Glass) and Swift 6.2
      # conformance syntax, so the iOS targets require Xcode 26 to compile.
      # Hosted runners currently ship Xcode 16.4; until an Xcode 26 image is
      # available these steps are skipped (instead of failing red). The macOS
      # `spm` job remains the authoritative compile/test gate.
      - name: Locate Xcode with iOS 26 SDK
        id: xcode
        run: |
          found=false
          for app in /Applications/Xcode_26*.app /Applications/Xcode*.app; do
            [ -d "$app" ] || continue
            bin="$app/Contents/Developer/usr/bin/xcodebuild"
            if "$bin" -showsdks 2>/dev/null | grep -q "iphonesimulator26"; then
              echo "Found iOS 26 SDK in $app"
              sudo xcode-select -s "$app"
              found=true
              break
            fi
          done
          echo "found=$found" >> "$GITHUB_OUTPUT"
          if [ "$found" = "false" ]; then
            echo "::notice::No Xcode with the iOS 26 SDK is available on this runner; skipping iOS builds. Verified locally and gated by the macOS SwiftPM job."
          fi
      - name: Build VXWalkthrough (iOS)
        if: steps.xcode.outputs.found == 'true'
        run: >
          xcodebuild build -scheme VXWalkthrough
          -destination 'generic/platform=iOS Simulator'
          -skipPackagePluginValidation
      - name: Build VXWalkthroughScanner (iOS)
        if: steps.xcode.outputs.found == 'true'
        run: >
          xcodebuild build -scheme VXWalkthroughScanner
          -destination 'generic/platform=iOS Simulator'
          -skipPackagePluginValidation
      - name: Build VXWalkthroughUIKit (iOS)
        if: steps.xcode.outputs.found == 'true'
        run: >
          xcodebuild build -scheme VXWalkthroughUIKit
          -destination 'generic/platform=iOS Simulator'
          -skipPackagePluginValidation
      - name: Build VXWalkthroughPermissions (iOS, all traits)
        if: steps.xcode.outputs.found == 'true'
        # xcodebuild has no trait flag; SwiftPM surfaces traits to the compiler
        # as active compilation conditions, so we inject every trait's flag to
        # compile-verify all permission backends under the iOS SDK.
        run: >
          xcodebuild build -scheme VXWalkthroughPermissions
          -destination 'generic/platform=iOS Simulator'
          -skipPackagePluginValidation
          OTHER_SWIFT_FLAGS='-D PermissionsNotifications -D PermissionsCamera -D PermissionsMicrophone -D PermissionsPhotos -D PermissionsLocation -D PermissionsContacts -D PermissionsTracking'
      - name: Test on iOS Simulator
        if: steps.xcode.outputs.found == 'true'
        run: >
          xcodebuild test -scheme VXWalkthrough-Package
          -destination 'platform=iOS Simulator,name=iPhone 16'
          -skipPackagePluginValidation
      - name: Build Demo app (iOS)
        if: steps.xcode.outputs.found == 'true'
        run: >
          xcodebuild build
          -project Demo/VXWalkthroughDemo.xcodeproj
          -scheme VXWalkthroughDemo
          -destination 'generic/platform=iOS Simulator'
          -skipPackagePluginValidation
          CODE_SIGNING_ALLOWED=NO

  catalyst-build:
    name: Mac Catalyst build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Locate Xcode with iOS 26 SDK
        id: xcode
        run: |
          found=false
          for app in /Applications/Xcode_26*.app /Applications/Xcode*.app; do
            [ -d "$app" ] || continue
            bin="$app/Contents/Developer/usr/bin/xcodebuild"
            if "$bin" -showsdks 2>/dev/null | grep -q "iphonesimulator26"; then
              sudo xcode-select -s "$app"
              found=true
              break
            fi
          done
          echo "found=$found" >> "$GITHUB_OUTPUT"
          if [ "$found" = "false" ]; then
            echo "::notice::No Xcode with the iOS 26 SDK is available on this runner; skipping Mac Catalyst builds."
          fi
      - name: Build VXWalkthrough (Mac Catalyst)
        if: steps.xcode.outputs.found == 'true'
        run: >
          xcodebuild build -scheme VXWalkthrough
          -destination 'platform=macOS,variant=Mac Catalyst'
          -skipPackagePluginValidation
      - name: Build VXWalkthroughScanner (Mac Catalyst)
        if: steps.xcode.outputs.found == 'true'
        run: >
          xcodebuild build -scheme VXWalkthroughScanner
          -destination 'platform=macOS,variant=Mac Catalyst'
          -skipPackagePluginValidation

name: CI

on:
  push:
    branches: [master, ios26_refactor]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spm:
    name: SwiftPM build & test (macOS host)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v

  ios-build:
    name: iOS build (all products + demo)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      # The SwiftUI layer uses iOS 26 SDK symbols (Liquid Glass) and Swift 6.2
      # conformance syntax, so the iOS targets require Xcode 26 to compile.
      # Hosted runners currently ship Xcode 16.4; until an Xcode 26 image is
      # available these steps are skipped (instead of failing red). The macOS
      # `spm` job remains the authoritative compile/test gate.
      - name: Locate Xcode with iOS 26 SDK
        id: xcode
        run: |
          found=false
          for app in /Applications/Xcode_26*.app /Applications/Xcode*.app; do
            [ -d "$app" ] || continue
            bin="$app/Contents/Developer/usr/bin/xcodebuild"
            if "$bin" -showsdks 2>/dev/null | grep -q "iphonesimulator26"; then
              echo "Found iOS 26 SDK in $app"
              sudo xcode-select -s "$app"
              found=true
              break
            fi
          done
          echo "found=$found" >> "$GITHUB_OUTPUT"
          if [ "$found" = "false" ]; then
            echo "::notice::No Xcode with the iOS 26 SDK is available on this runner; skipping iOS builds. Verified locally and gated by the macOS SwiftPM job."
          fi
      - name: Build VXWalkthrough (iOS)
        if: steps.xcode.outputs.found == 'true'
        run: >
          xcodebuild build -scheme VXWalkthrough
          -destination 'generic/platform=iOS Simulator'
          -skipPackagePluginValidation
      - name: Build VXWalkthroughScanner (iOS)
        if: steps.xcode.outputs.found == 'true'
        run: >
          xcodebuild build -scheme VXWalkthroughScanner
          -destination 'generic/platform=iOS Simulator'
          -skipPackagePluginValidation
      - name: Build VXWalkthroughUIKit (iOS)
        if: steps.xcode.outputs.found == 'true'
        run: >
          xcodebuild build -scheme VXWalkthroughUIKit
          -destination 'generic/platform=iOS Simulator'
          -skipPackagePluginValidation
      - name: Test on iOS Simulator
        if: steps.xcode.outputs.found == 'true'
        run: >
          xcodebuild test -scheme VXWalkthrough-Package
          -destination 'platform=iOS Simulator,name=iPhone 16'
          -skipPackagePluginValidation
      - name: Build Demo app (iOS)
        if: steps.xcode.outputs.found == 'true'
        run: >
          xcodebuild build
          -project Demo/VXWalkthroughDemo.xcodeproj
          -scheme VXWalkthroughDemo
          -destination 'generic/platform=iOS Simulator'
          -skipPackagePluginValidation
          CODE_SIGNING_ALLOWED=NO

  catalyst-build:
    name: Mac Catalyst build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Locate Xcode with iOS 26 SDK
        id: xcode
        run: |
          found=false
          for app in /Applications/Xcode_26*.app /Applications/Xcode*.app; do
            [ -d "$app" ] || continue
            bin="$app/Contents/Developer/usr/bin/xcodebuild"
            if "$bin" -showsdks 2>/dev/null | grep -q "iphonesimulator26"; then
              sudo xcode-select -s "$app"
              found=true
              break
            fi
          done
          echo "found=$found" >> "$GITHUB_OUTPUT"
          if [ "$found" = "false" ]; then
            echo "::notice::No Xcode with the iOS 26 SDK is available on this runner; skipping Mac Catalyst builds."
          fi
      - name: Build VXWalkthrough (Mac Catalyst)
        if: steps.xcode.outputs.found == 'true'
        run: >
          xcodebuild build -scheme VXWalkthrough
          -destination 'platform=macOS,variant=Mac Catalyst'
          -skipPackagePluginValidation
      - name: Build VXWalkthroughScanner (Mac Catalyst)
        if: steps.xcode.outputs.found == 'true'
        run: >
          xcodebuild build -scheme VXWalkthroughScanner
          -destination 'platform=macOS,variant=Mac Catalyst'
          -skipPackagePluginValidation
